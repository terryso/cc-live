<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CC Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" integrity="sha384-eFTL69TLRZTkNfYZOLM+G04821K1qZao/4QLJbet1pP4tcF+fdXq/9CdqAbWRl/L" crossorigin="anonymous" id="hljs-light">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH" crossorigin="anonymous" id="hljs-dark" disabled>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js" integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" integrity="sha384-RH2xi4eIQ/gjtbs9fUXM68sLSi99C7ZWBRX1vDrVv6GQXRibxXLbwO2NGZB74MbU" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.5/purify.min.js" integrity="sha384-qSFej5dZNviyoPgYJ5+Xk4bEbX8AYddxAHPuzs1aSgRiXxJ3qmyWNaPsRkpv/+x5" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-hover: #f5f5f5;
    --border: #e5e7eb;
    --text: #1a1a2e;
    --text-secondary: #4a5568;
    --dim: #9ca3af;
    --muted: #6b7280;
    --blue: #2563eb;
    --blue-soft: #dbeafe;
    --blue-dim: #eff6ff;
    --green: #16a34a;
    --green-soft: #dcfce7;
    --yellow: #ca8a04;
    --yellow-soft: #fef9c3;
    --red: #dc2626;
    --red-soft: #fee2e2;
    --purple: #7c3aed;
    --purple-soft: #ede9fe;
    --orange: #ea580c;
    --orange-soft: #ffedd5;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    --radius: 10px;
    --transition: .2s ease;
  }

  [data-theme="dark"] {
    --bg: #0f1117;
    --surface: #1a1b23;
    --surface-hover: #24252f;
    --border: #2d2e3a;
    --text: #e4e4e7;
    --text-secondary: #a1a1aa;
    --dim: #71717a;
    --muted: #52525b;
    --blue: #60a5fa;
    --blue-soft: rgba(96,165,250,.12);
    --blue-dim: rgba(96,165,250,.08);
    --green: #4ade80;
    --green-soft: rgba(74,222,128,.1);
    --yellow: #facc15;
    --yellow-soft: rgba(250,204,21,.1);
    --red: #f87171;
    --red-soft: rgba(248,113,113,.1);
    --purple: #a78bfa;
    --purple-soft: rgba(167,139,250,.1);
    --orange: #fb923c;
    --orange-soft: rgba(251,146,60,.08);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,.3);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background var(--transition), color var(--transition);
  }

  .app { display: flex; height: 100vh; overflow: hidden }

  /* Sidebar */
  .sidebar {
    width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform .3s ease, background var(--transition);
    z-index: 40;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-hd {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-hd-left {}
  .sidebar-hd h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.2px;
  }
  .sidebar-hd h1 span { color: var(--blue); }
  .sidebar-hd .status {
    font-size: 12px;
    color: var(--green);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sidebar-hd .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    box-shadow: 0 0 6px var(--green);
  }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }

  .sidebar-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .theme-toggle, .mobile-menu-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    font-size: 16px;
  }
  .theme-toggle:hover, .mobile-menu-btn:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: var(--muted);
  }
  .mobile-menu-btn { display: none }

  .slist { flex: 1; overflow-y: auto; padding: 10px; overscroll-behavior-y: contain }
  .slist::-webkit-scrollbar { width: 4px }
  .slist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px }

  .pitem {
    padding: 12px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pitem:hover { background: var(--surface-hover) }
  .pitem.active {
    background: var(--blue-dim);
    border-color: var(--blue);
    box-shadow: var(--shadow-sm);
  }
  .pitem-info { flex: 1; min-width: 0 }
  .pitem .pname { font-size: 13px; font-weight: 500; word-break: break-all; display: flex; align-items: center; gap: 6px }
  .pitem .pmeta { font-size: 11px; color: var(--dim); margin-top: 3px }
  .dev-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    box-shadow: 0 0 6px var(--green);
    vertical-align: middle;
    margin-right: 4px;
  }
  .share-btn {
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 8px;
    font-family: var(--sans);
    font-weight: 500;
    transition: all var(--transition);
  }
  .share-btn:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-dim) }

  /* Filter bar */
  .filter-bar {
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: none;
    align-items: center;
    gap: 6px;
    transition: background var(--transition);
  }
  .filter-bar.visible { display: flex }
  .filter-bar .filter-label {
    font-size: 11px;
    color: var(--dim);
    font-weight: 500;
    margin-right: 4px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .filter-chip {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    transition: all var(--transition);
  }
  .filter-chip:hover { background: var(--surface-hover); color: var(--text); border-color: var(--muted) }
  .filter-chip.active { background: var(--blue-dim); color: var(--blue); border-color: var(--blue) }
  .filter-bar .filter-count {
    font-size: 10px;
    color: var(--dim);
    margin-left: auto;
    font-family: var(--mono);
  }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative }
  .main-hd {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background var(--transition);
  }
  .main-hd-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1 }
  .main-hd-info { min-width: 0; flex: 1 }
  .main-hd .title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
  .main-hd .path { font-size: 12px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
  .gh-link {
    color: var(--dim);
    transition: color var(--transition);
    flex-shrink: 0;
    margin-left: 12px;
    display: flex;
    align-items: center;
  }
  .gh-link:hover { color: var(--text) }

  .msgs {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
    overscroll-behavior-y: contain;
    background: var(--bg);
  }
  .msgs::-webkit-scrollbar { width: 5px }
  .msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px }

  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 15px;
    text-align: center;
    flex-direction: column;
    gap: 8px;
  }

  /* Messages */
  .msg { margin-bottom: 18px; width: 100% }
  .msg-role {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 6px;
    font-weight: 600;
    font-family: var(--sans);
  }
  .msg-role.user { color: var(--blue) }
  .msg-role.assistant { color: var(--green) }
  .msg-role.system { color: var(--yellow) }
  .msg-role.tool_response { color: var(--orange) }

  .msg-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    overflow: hidden;
    position: relative;
    box-shadow: var(--shadow-sm);
    transition: background var(--transition), border-color var(--transition);
  }
  .msg-body.collapsed { max-height: 300px }
  .msg-body.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 70px;
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }
  .msg.user .msg-body { border-left: 3px solid var(--blue) }
  .msg.assistant .msg-body { border-left: 3px solid var(--green) }

  .msg-text {
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 13px;
    line-height: 1.7;
    font-family: var(--sans);
  }
  .msg-thinking {
    color: var(--dim);
    font-style: italic;
    font-size: 12px;
    font-family: var(--sans);
  }
  .msg-thinking::before { content: "\1F4AD  " }
  .msg-thinking .thinking-full { display:none }
  .msg-thinking.thinking-expanded .thinking-full { display:block }
  .msg-thinking.thinking-expanded .thinking-collapsed { display:none }
  .thinking-toggle {
    display: inline-block;
    cursor: pointer;
    color: var(--purple);
    font-style: normal;
    font-size: 11px;
    margin-top: 4px;
    opacity: 0.8;
  }
  .thinking-toggle:hover { opacity: 1; text-decoration: underline }
  .msg-thinking pre { margin: 6px 0; font-style: normal }
  .msg-thinking code { font-style: normal; font-size: 11px }
  .msg-thinking pre code { font-size: 11px }
  .msg-thinking p { margin: 4px 0 }
  .msg-thinking ul, .msg-thinking ol { margin: 4px 0; padding-left: 20px }
  .msg-thinking strong { font-style: normal }
  .msg-thinking a { color: var(--purple) }

  .tool-call {
    margin: 10px 0;
    padding: 10px 14px;
    background: var(--purple-soft);
    border-left: 3px solid var(--purple);
    border-radius: 6px;
    font-size: 12px;
  }
  .tool-call .tname { color: var(--purple); font-weight: 600; font-family: var(--mono); font-size: 12px }
  .tool-call .targs {
    color: var(--dim);
    margin-top: 6px;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
    font-family: var(--mono);
  }

  .tool-result {
    margin: 10px 0;
    padding: 10px 14px;
    background: var(--orange-soft);
    border-left: 3px solid var(--orange);
    border-radius: 6px;
    font-size: 11px;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-all;
    font-family: var(--mono);
  }

  .expand-btn {
    font-size: 12px;
    color: var(--blue);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    font-family: var(--sans);
    font-weight: 500;
    transition: opacity var(--transition);
  }
  .expand-btn:hover { opacity: .7 }

  .model-tag {
    display: inline-block;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface-hover);
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    font-family: var(--mono);
    border: 1px solid var(--border);
  }

  .ts { font-size: 11px; color: var(--dim); margin-top: 6px }

  .session-divider {
    margin: 24px 0;
    padding: 10px 0;
    border-top: 1px dashed var(--border);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    font-family: var(--mono);
  }

  .load-more-btn {
    padding: 14px;
    text-align: center;
    color: var(--blue);
    cursor: pointer;
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    margin: 8px 0;
    font-weight: 500;
    transition: all var(--transition);
  }
  .load-more-btn:hover { background: var(--blue-dim); border-color: var(--blue) }

  /* Scroll nav */
  .scroll-nav {
    position: fixed;
    right: 80px; bottom: 24px;
    z-index: 50;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all var(--transition);
    opacity: 0;
    pointer-events: none;
    box-shadow: var(--shadow-md);
  }
  .scroll-nav.visible { opacity: 1; pointer-events: auto }
  .scroll-nav:hover { background: var(--surface-hover); color: var(--text) }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 480px;
    width: 90%;
    box-shadow: var(--shadow-lg);
  }
  .modal h2 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px }
  .modal .share-url {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--green);
    word-break: break-all;
    margin: 12px 0;
  }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end }
  .modal button {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    transition: all var(--transition);
  }
  .modal button:hover { border-color: var(--blue); background: var(--surface-hover) }
  .modal button.primary { background: var(--blue); border-color: var(--blue); color: #fff }
  .modal button.primary:hover { opacity: .9 }
  .modal .hint { font-size: 12px; color: var(--dim); margin-top: 8px; line-height: 1.5 }

  /* Shares panel */
  .shares-panel { border-top: 1px solid var(--border); padding: 10px; max-height: 200px; overflow-y: auto }
  .shares-panel .sh-title {
    font-size: 11px;
    color: var(--dim);
    padding: 4px 10px;
    text-transform: uppercase;
    letter-spacing: .5px;
    font-weight: 600;
  }
  .share-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
    transition: background var(--transition);
  }
  .share-item:hover { background: var(--surface-hover) }
  .share-item .sh-proj { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
  .share-item .sh-token { color: var(--dim); font-size: 10px; margin: 0 8px; font-family: var(--mono) }
  .revoke-btn {
    font-size: 11px;
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 3px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all var(--transition);
  }
  .revoke-btn:hover { background: var(--red); color: #fff }

  /* Chat bubble */
  .chat-bubble { position: fixed; bottom: 24px; right: 24px; z-index: 90; display: none }
  .chat-bubble.active { display: block }
  .chat-toggle {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .chat-toggle:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(37,99,235,.3) }
  .chat-panel {
    position: absolute;
    bottom: 62px; right: 0;
    width: 380px; height: 500px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .chat-panel.open { display: block }
  .chat-panel iframe { width: 100%; height: 100%; border: 0 }

  /* Mobile overlay */
  .sidebar-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    z-index: 35;
  }
  .sidebar-overlay.active { display: block }

  /* Mobile responsive */
  /* Markdown rendered content */
  .msg-text.md-render { white-space: normal }
  .msg-text.md-render p { margin: 0 0 8px }
  .msg-text.md-render p:last-child { margin-bottom: 0 }
  .msg-text.md-render h1,.msg-text.md-render h2,.msg-text.md-render h3,
  .msg-text.md-render h4,.msg-text.md-render h5,.msg-text.md-render h6 {
    margin: 12px 0 6px; font-weight: 600; line-height: 1.3;
  }
  .msg-text.md-render h1 { font-size: 1.4em }
  .msg-text.md-render h2 { font-size: 1.25em }
  .msg-text.md-render h3 { font-size: 1.1em }
  .msg-text.md-render ul,.msg-text.md-render ol { margin: 6px 0; padding-left: 20px }
  .msg-text.md-render li { margin: 2px 0 }
  .msg-text.md-render blockquote {
    margin: 8px 0; padding: 6px 12px;
    border-left: 3px solid var(--border); color: var(--text-secondary);
    background: var(--surface-hover); border-radius: 4px;
  }
  .msg-text.md-render code {
    font-family: var(--mono); font-size: 0.9em;
    background: var(--surface-hover); padding: 1px 5px; border-radius: 4px;
  }
  .msg-text.md-render pre {
    margin: 8px 0; padding: 12px; border-radius: 8px;
    overflow-x: auto; background: var(--bg); border: 1px solid var(--border);
  }
  .msg-text.md-render pre code {
    background: none; padding: 0; font-size: 12px; line-height: 1.5;
  }
  /* Diff rendering */
  .msg-text.md-render pre.diff-block {
    padding: 0; overflow-x: auto;
  }
  .msg-text.md-render pre.diff-block code {
    display: block; padding: 12px 0;
    counter-reset: diff-line;
  }
  .msg-text.md-render .diff-line {
    display: block; padding: 0 12px 0 48px; position: relative; min-height: 1.5em;
    white-space: pre;
  }
  .msg-text.md-render .diff-line::before {
    content: counter(diff-line); counter-increment: diff-line;
    position: absolute; left: 0; width: 38px; text-align: right;
    color: var(--dim); font-size: 11px; user-select: none;
  }
  .msg-text.md-render .diff-add { background: rgba(22, 163, 74, .12); }
  .msg-text.md-render .diff-del { background: rgba(220, 38, 38, .12); }
  [data-theme="dark"] .msg-text.md-render .diff-add { background: rgba(74, 222, 128, .15); }
  [data-theme="dark"] .msg-text.md-render .diff-del { background: rgba(248, 113, 113, .15); }
  .msg-text.md-render .diff-hunk {
    background: rgba(37, 99, 235, .1); color: var(--blue); font-weight: 500;
    counter-increment: none;
  }
  .msg-text.md-render .diff-hunk::before { content: ''; counter-increment: none; }
  @media (max-width: 768px) {
    .msg-text.md-render .diff-line { padding-left: 12px; }
    .msg-text.md-render .diff-line::before { display: none; }
  }
  .msg-text.md-render table {
    border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 12px;
  }
  .msg-text.md-render th,.msg-text.md-render td {
    border: 1px solid var(--border); padding: 6px 10px; text-align: left;
  }
  .msg-text.md-render th { background: var(--surface-hover); font-weight: 600 }
  .msg-text.md-render hr { border: none; border-top: 1px solid var(--border); margin: 12px 0 }
  .msg-text.md-render a { color: var(--blue); text-decoration: none }
  .msg-text.md-render a:hover { text-decoration: underline }
  .msg-text.md-render img { max-width: 100%; border-radius: 6px }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      transform: translateX(-100%);
      box-shadow: var(--shadow-lg);
    }
    .sidebar.open { transform: translateX(0) }
    .mobile-menu-btn { display: flex }
    .msgs { padding: 16px }
    .main-hd { padding: 12px 16px }
    .chat-panel { width: calc(100vw - 48px); right: -12px }
    .scroll-nav { right: 24px }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hd">
      <div class="sidebar-hd-left">
        <h1><span>CC</span> LIVE</h1>
        <div class="status"><span class="dot" id="dot"></span><span id="status">Connecting...</span></div>
      </div>
      <div class="sidebar-actions">
        <button type="button" class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">☀️</button>
      </div>
    </div>
    <div class="slist" id="slist"></div>
    <div class="shares-panel" id="sharesPanel" style="display:none">
      <div class="sh-title">Active Shares</div>
      <div id="sharesList"></div>
    </div>
  </div>
  <div class="main">
    <div class="main-hd">
      <div class="main-hd-left">
        <button type="button" class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="main-hd-info">
          <div class="title" id="title">Select a project</div>
          <div class="path" id="path"></div>
        </div>
      </div>
      <a class="gh-link" href="https://github.com/terryso/cc-live" target="_blank" rel="noopener" title="GitHub" aria-label="View on GitHub">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </div>
    <div class="filter-bar" id="filterBar">
      <span class="filter-label">Filter</span>
      <button class="filter-chip active" data-role="all">All</button>
      <button class="filter-chip" data-role="user">User</button>
      <button class="filter-chip" data-role="assistant">Assistant</button>
      <button class="filter-chip" data-role="tool_response">Tool</button>
      <button class="filter-chip" data-role="system">System</button>
      <span class="filter-count" id="filterCount"></span>
    </div>
    <div class="msgs" id="msgs"><div class="empty">Select a project to view sessions</div></div>
    <button type="button" class="scroll-nav to-top" id="scrollToTop" aria-label="Scroll to top" onclick="document.getElementById('msgs').scrollTop=0">&#8593;</button>
    <button type="button" class="scroll-nav to-bottom" id="scrollToBottom" aria-label="Scroll to bottom" onclick="document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight">&#8595;</button>
  </div>
</div>
<div class="chat-bubble" id="chatBubble">
  <div class="chat-panel" id="chatPanel"></div>
  <button type="button" class="chat-toggle" id="chatToggle" title="Chat">&#128172;</button>
</div>
<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="modalTitle">Share Project</h2>
    <div id="modalBody"></div>
    <div class="btn-row">
      <button type="button" onclick="closeModal()">Close</button>
      <button type="button" id="modalCopyBtn" class="primary" onclick="copyShareUrl()">Copy URL</button>
    </div>
  </div>
</div>
<script>
const sessions = new Map();
let activeProject = null;
let loadedBefore = null;
let hasMoreHistory = true;
let isShareView = false;
let shareProject = null;
let currentShareUrl = "";
let publicOrigin = null;

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

// Active development indicator
const _devTimers = new Map(); // project → timeout ID
const DEV_TIMEOUT = 120000; // 2 min no message → mark idle

function markActive(project) {
  const prev = _devTimers.get(project);
  if (prev) clearTimeout(prev);
  _devTimers.set(project, setTimeout(() => {
    _devTimers.delete(project);
    renderList();
  }, DEV_TIMEOUT));
  renderList();
}

function isDiffContent(lang, text) {
  if (lang === 'diff') return true;
  if (lang && lang !== 'plaintext') return false;
  const lines = text.split('\n');
  const hasHunk = lines.some(l => l.startsWith('@@'));
  let add = 0, del = 0;
  for (const l of lines) {
    if (l.startsWith('+') && !l.startsWith('+++')) add++;
    else if (l.startsWith('-') && !l.startsWith('---')) del++;
  }
  if (hasHunk) return (add + del) > 0;
  return add > 0 && del > 0 && (add + del) / lines.length > 0.3;
}
function renderDiff(text) {
  const lines = text.split('\n');
  const out = lines.map(raw => {
    const e = esc(raw);
    if (raw.startsWith('@@')) return '<span class="diff-line diff-hunk">' + e + '</span>';
    if (raw.startsWith('+')) return '<span class="diff-line diff-add">' + e + '</span>';
    if (raw.startsWith('-')) return '<span class="diff-line diff-del">' + e + '</span>';
    return '<span class="diff-line">' + e + '</span>';
  });
  return '<pre class="diff-block"><code class="hljs language-diff">' + out.join('') + '</code></pre>';
}
marked.use({ breaks: true, gfm: true, renderer: { code({ text, lang }) {
  if (isDiffContent(lang, text)) return renderDiff(text);
  const language = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
  return '<pre><code class="hljs language-' + language + '">' + hljs.highlight(text, { language }).value + '</code></pre>';
} } });
var _mdAllowedTags = ['p','h1','h2','h3','h4','h5','h6','ul','ol','li','blockquote','pre','code','em','strong','del','a','table','thead','tbody','tr','th','td','hr','br','img','span','sup','sub','details','summary'];
var _mdAllowedAttr = ['href','alt','title','class','id','target','rel'];
function renderMd(text, isMarkdown) {
  if (!text) return '';
  if (isMarkdown) return DOMPurify.sanitize(marked.parse(text), { ALLOWED_TAGS: _mdAllowedTags, ALLOWED_ATTR: _mdAllowedAttr });
  return esc(text);
}

function renderThinking(text) {
  if (!text || !text.trim()) return '';
  var TRUNCATE = 500;
  var rendered = renderMd(text, true);
  if (text.length <= TRUNCATE) return '<div class="msg-thinking">' + rendered + '</div>';
  var shortText = text.substring(0, TRUNCATE);
  var shortRendered = renderMd(shortText, true);
  return '<div class="msg-thinking">' +
    '<div class="thinking-collapsed">' + shortRendered +
    '<p style="margin:4px 0 0">…<span class="thinking-toggle" onclick="toggleThinking(this)">展开</span></p></div>' +
    '<div class="thinking-full">' + rendered +
    ' <span class="thinking-toggle" onclick="toggleThinking(this)">收起</span></div>' +
    '</div>';
}

function toggleThinking(el) {
  var container = el.closest('.msg-thinking');
  if (!container) return;
  container.classList.toggle('thinking-expanded');
  var body = container.closest('.msg-body');
  if (body && body.classList.contains('collapsed')) body.classList.remove('collapsed');
}

function getSSEUrl(){
  const params = new URLSearchParams(window.location.search);
  const t = params.get('t');
  return '/events' + (t ? '?t=' + encodeURIComponent(t) : '');
}

function connect(){
  const es = new EventSource(getSSEUrl());
  es.addEventListener('sessions', e => {
    JSON.parse(e.data).forEach(s => {
      if (!sessions.has(s.sessionId)) sessions.set(s.sessionId, {...s, messages:[]});
      else {
        const existing = sessions.get(s.sessionId);
        existing.messageCount = s.messageCount;
      }
    });
    renderList();
    if (activeProject) loadMessages();
  });
  es.addEventListener('session-new', e => {
    const s = JSON.parse(e.data);
    sessions.set(s.sessionId, {...s, messages:[]});
    renderList();
    if (activeProject === s.projectName) loadMessages();
  });
  es.addEventListener('message', e => {
    const m = JSON.parse(e.data);
    const s = sessions.get(m.sessionId);
    if(!s) return;
    s.messages.push(m);
    if(s.messages.length>500) s.messages=s.messages.slice(-300);
    markActive(s.projectName);
    if(activeProject && s.projectName === activeProject) appendMsg(m);
  });
  es.addEventListener('share-info', e => {
    const info = JSON.parse(e.data);
    if (info.error) {
      document.getElementById('title').textContent = 'Access Denied';
      document.getElementById('msgs').innerHTML = '<div class="empty">No access. A valid share token is required.</div>';
      return;
    }
    isShareView = true;
    shareProject = info.project;
    activeProject = info.project;
    document.getElementById('title').textContent = info.project;
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('t');
    const chatPanel = document.getElementById('chatPanel');
    if (token && !chatPanel.querySelector('iframe')) {
      document.getElementById('chatBubble').classList.add('active');
      const iframe = document.createElement('iframe');
      iframe.src = 'https://chitchatter.im/public/' + encodeURIComponent(token) + '?embed=1';
      iframe.allow = 'camera;microphone;display-capture;fullscreen';
      chatPanel.appendChild(iframe);
    }
    renderList();
    loadMessages();
  });
  es.addEventListener('viewer_count', e => {
    try { const { count } = JSON.parse(e.data); if (typeof count === 'number') document.getElementById('status').textContent = count === 1 ? 'Live · 1 viewing' : `Live · ${count} viewing`; } catch {}
  });
  es.addEventListener('public-origin', e => {
    publicOrigin = e.data;
    try { publicOrigin = JSON.parse(publicOrigin); } catch {}
  });
  es.onerror=()=>{document.getElementById('status').textContent='Reconnecting...';document.getElementById('dot').style.background='var(--red)'};
  es.onopen=()=>{document.getElementById('status').textContent='Live';document.getElementById('dot').style.background='var(--green)';renderList()};
}

function getProjects(){
  const groups = new Map();
  for (const [, s] of sessions) {
    if (s.isSubagent) continue;
    const key = s.projectName || 'unknown';
    if (!groups.has(key)) groups.set(key, { sessionCount: 0, totalMessages: 0 });
    const g = groups.get(key);
    g.sessionCount++;
    g.totalMessages += s.messages.length;
  }
  return [...groups.entries()].sort((a, b) => b[1].totalMessages - a[1].totalMessages);
}

function renderList(){
  const el = document.getElementById('slist');
  const projects = getProjects();
  el.innerHTML = '';
  for (const [proj, info] of projects) {
    const d = document.createElement('div');
    d.className = 'pitem' + (proj === activeProject ? ' active' : '');
    const active = _devTimers.has(proj);
    const dot = active ? '<span class="dev-dot"></span>' : '';
    const meta = (active ? dot + '<span style="color:var(--green)">直播中</span> · ' : '<span style="color:var(--dim)">空闲</span> · ') + info.sessionCount + ' sessions · ' + info.totalMessages + ' msgs';
    let inner = '<div class="pitem-info"><div class="pname">' + esc(proj) + '</div><div class="pmeta">' + meta + '</div></div>';
    if (!isShareView) {
      inner += '<button class="share-btn" onclick="event.stopPropagation();createShare(\''+esc(proj).replace(/'/g,"\\'")+'\')">Share</button>';
    }
    d.innerHTML = inner;
    d.onclick = () => { selectProject(proj); closeMobileMenu(); };
    el.appendChild(d);
  }
  if (!isShareView) loadShares();
}

function selectProject(proj){
  activeProject = proj;
  loadedBefore = null;
  hasMoreHistory = true;
  activeFilter = 'all';
  filterBar.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.role === 'all'));
  filterCount.textContent = '';
  document.getElementById('title').textContent = proj;
  document.getElementById('path').textContent = '';
  showFilterBar();
  renderList();
  loadMessages();
}

async function loadMessages(){
  showFilterBar();
  const el = document.getElementById('msgs');
  const isFirstPage = !loadedBefore;
  if (isFirstPage) el.innerHTML = '';
  const params = new URLSearchParams({project: activeProject, limit: 50});
  if (loadedBefore) params.set('before', loadedBefore);
  const urlParams = new URLSearchParams(window.location.search);
  const t = urlParams.get('t');
  if (t) params.set('t', t);
  try {
    const r = await fetch('/api/project-messages?' + params);
    const msgs = await r.json();
    if (!msgs.length) { hasMoreHistory = false; if (!el.children.length || el.querySelector('.empty')) el.innerHTML = '<div class="empty">No messages yet</div>'; return; }
    const prevHeight = el.scrollHeight;
    const existingBtn = el.querySelector('.load-more-btn');
    if (existingBtn) existingBtn.remove();
    const existingEmpty = el.querySelector('.empty');
    if (existingEmpty) existingEmpty.remove();
    const fragment = document.createDocumentFragment();
    let lastSid = null;
    for (const m of msgs) {
      if (m._sid !== lastSid) {
        lastSid = m._sid;
        const div = document.createElement('div');
        div.className = 'session-divider';
        div.textContent = '--- session ' + m._sid.slice(0, 12) + '... ---';
        fragment.appendChild(div);
      }
      fragment.appendChild(createMsgEl(m));
    }
    const oldestTs = msgs[0].timestamp;
    el.insertBefore(fragment, el.firstChild);
    addExpandButtons(el);
    applyFilter();
    loadedBefore = oldestTs;
    if (msgs.length < 50) hasMoreHistory = false;
    // Auto-load next page if filter hid all newly loaded messages
    if (activeFilter !== 'all' && hasMoreHistory) {
      const hasMatch = msgs.some(m => (m.role || 'system') === activeFilter);
      if (!hasMatch) { loadMessages(); return; }
    }
    if (msgs.length >= 50) {
      const btn = document.createElement('div');
      btn.className = 'load-more-btn';
      btn.textContent = 'Load more...';
      btn.onclick = () => { loadMessages(); };
      el.insertBefore(btn, el.firstChild);
    }
    if (isFirstPage) {
      el.scrollTop = el.scrollHeight;
      // Mark active if last message is within timeout
      const lastTs = msgs[msgs.length - 1].timestamp;
      if (lastTs && Date.now() - new Date(lastTs).getTime() < DEV_TIMEOUT) {
        markActive(activeProject);
      }
    } else {
      el.scrollTo({ top: el.scrollHeight - prevHeight, behavior: 'instant' });
    }
  } catch {}
}

function msgContent(m){
  const isMd = m.role === 'assistant';
  const cls = isMd ? 'msg-text md-render' : 'msg-text';
  let h = '';
  if (m.display) {
    if (m.display.type === 'text') h = '<div class="' + cls + '">' + renderMd(m.display.text, isMd) + '</div>';
    else if (m.display.type === 'summary') h = '<div class="msg-text" style="color:var(--yellow)">' + esc(m.display.text) + '</div>';
    else if (m.display.type === 'blocks') {
      (m.display.parts || []).forEach(p => {
        if (p.type === 'text') h += '<div class="' + cls + '">' + renderMd(p.text, isMd) + '</div>';
        else if (p.type === 'thinking') h += renderThinking(p.text);
        else if (p.type === 'tool_use') h += '<div class="tool-call"><span class="tname">' + esc(p.toolName) + '</span><div class="targs">' + esc(p.args) + '</div></div>';
        else if (p.type === 'tool_result') h += '<div class="tool-result">' + esc(p.text) + '</div>';
      });
      if (m.display.model) h += '<span class="model-tag">' + esc(m.display.model) + '</span>';
    }
  }
  return h;
}

function createMsgEl(m){
  const d = document.createElement('div');
  d.className = 'msg ' + (m.role || 'system');
  const h = msgContent(m);
  if (!h) { d.style.display = 'none'; return d; }
  const ts = m.timestamp ? new Date(m.timestamp).toLocaleTimeString() : '';
  d.innerHTML = '<div class="msg-role ' + (m.role || 'system') + '">' + (m.role || 'system') + '</div><div class="msg-body collapsible collapsed">' + h + '</div>' + (ts ? '<div class="ts">' + ts + '</div>' : '');
  return d;
}

function appendMsg(m){
  const el = document.getElementById('msgs');
  const e = el.querySelector('.empty'); if (e) e.remove();
  const d = document.createElement('div');
  d.className = 'msg ' + (m.role || 'system');
  const h = msgContent(m);
  if (!h) return;
  const ts = m.timestamp ? new Date(m.timestamp).toLocaleTimeString() : '';
  d.innerHTML = '<div class="msg-role ' + (m.role || 'system') + '">' + (m.role || 'system') + '</div><div class="msg-body collapsible collapsed">' + h + '</div>' + (ts ? '<div class="ts">' + ts + '</div>' : '');
  // Apply current filter
  if (activeFilter !== 'all' && !d.classList.contains(activeFilter)) d.style.display = 'none';
  el.appendChild(d);
  addExpandButtons(d);
  // Update count
  if (activeFilter !== 'all') {
    const total = el.querySelectorAll('.msg').length;
    const visible = el.querySelectorAll('.msg.' + activeFilter).length;
    filterCount.textContent = visible + '/' + total;
  }
  const distFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
  if (distFromBottom < el.clientHeight) el.scrollTop = el.scrollHeight;
}

async function createShare(project) {
  try {
    const r = await fetch('/api/shares', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ project }) });
    const data = await r.json();
    if (!r.ok) { alert('Error: ' + data.error); return; }
    const origin = publicOrigin || window.location.origin;
    currentShareUrl = origin + data.url;
    document.getElementById('modalTitle').textContent = 'Share: ' + project;
    document.getElementById('modalBody').innerHTML = '<div class="hint">Share this URL to let others view this project\'s sessions:</div><div class="share-url" id="shareUrlText">' + esc(currentShareUrl) + '</div><div class="hint">The project name is not visible in the URL. Revoke at any time from the sidebar.</div>';
    document.getElementById('modal').style.display = 'flex';
  } catch (e) { alert('Failed to create share: ' + e.message); }
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function copyShareUrl() {
  navigator.clipboard.writeText(currentShareUrl).then(() => {
    document.getElementById('modalCopyBtn').textContent = 'Copied!';
    setTimeout(() => { document.getElementById('modalCopyBtn').textContent = 'Copy URL'; }, 2000);
  });
}

async function loadShares() {
  try {
    const r = await fetch('/api/shares');
    const shares = await r.json();
    const panel = document.getElementById('sharesPanel');
    const list = document.getElementById('sharesList');
    if (shares.length === 0) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    list.innerHTML = '';
    for (const s of shares) {
      const d = document.createElement('div');
      d.className = 'share-item';
      d.innerHTML = '<span class="sh-proj">' + esc(s.project) + '</span><span class="sh-token">' + s.token.slice(0, 8) + '...</span><button class="revoke-btn" onclick="revokeShare(\'' + s.token + '\')">Revoke</button>';
      list.appendChild(d);
    }
  } catch {}
}

async function revokeShare(token) {
  await fetch('/api/shares/' + token, { method: 'DELETE' });
  loadShares();
}

function addExpandButtons(container) {
  container.querySelectorAll('.collapsible.collapsed').forEach(el => {
    if (el.scrollHeight <= el.clientHeight + 10) {
      el.classList.remove('collapsed');
      return;
    }
    const btn = document.createElement('button');
    btn.className = 'expand-btn';
    btn.textContent = 'Show more';
    btn.onclick = function() {
      if (el.classList.contains('collapsed')) {
        el.classList.remove('collapsed');
        btn.textContent = 'Show less';
      } else {
        el.classList.add('collapsed');
        btn.textContent = 'Show more';
      }
    };
    el.parentNode.insertBefore(btn, el.nextSibling);
  });
}

connect();

// Theme toggle
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('cc-live-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

function setHljsTheme(theme) {
  document.getElementById('hljs-light').disabled = (theme === 'dark');
  document.getElementById('hljs-dark').disabled = (theme !== 'dark');
}
setHljsTheme(savedTheme);

themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('cc-live-theme', next);
  themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
  setHljsTheme(next);
});

// Mobile menu
const mobileMenuBtn = document.getElementById('mobileMenuBtn');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

function closeMobileMenu() {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('active');
}

mobileMenuBtn.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  sidebarOverlay.classList.toggle('active');
});
sidebarOverlay.addEventListener('click', closeMobileMenu);

// Chat bubble toggle
document.getElementById('chatToggle').addEventListener('click', () => {
  const panel = document.getElementById('chatPanel');
  panel.classList.toggle('open');
});

// Role filter
let activeFilter = 'all';
const filterBar = document.getElementById('filterBar');
const filterCount = document.getElementById('filterCount');

filterBar.addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  const role = chip.dataset.role;
  if (role === activeFilter) return;
  activeFilter = role;
  filterBar.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.role === role));
  applyFilter();
});

function applyFilter() {
  const msgsEl = document.getElementById('msgs');
  const msgEls = msgsEl.querySelectorAll('.msg');
  let visible = 0, total = 0;
  msgEls.forEach(el => {
    total++;
    const match = activeFilter === 'all' || el.classList.contains(activeFilter);
    el.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  const dividers = msgsEl.querySelectorAll('.session-divider');
  dividers.forEach(d => d.style.display = activeFilter === 'all' ? '' : 'none');
  filterCount.textContent = activeFilter === 'all' ? '' : visible + '/' + total;
}

function showFilterBar() {
  filterBar.classList.add('visible');
}

// Scroll navigation
const msgsEl = document.getElementById('msgs');
const scrollBtnTop = document.getElementById('scrollToTop');
const scrollBtnBottom = document.getElementById('scrollToBottom');
msgsEl.addEventListener('scroll', () => {
  const { scrollTop, scrollHeight, clientHeight } = msgsEl;
  const atBottom = scrollHeight - scrollTop - clientHeight < 80;
  const atTop = scrollTop < 80;
  scrollBtnTop.classList.toggle('visible', atBottom && scrollTop > 80);
  scrollBtnBottom.classList.toggle('visible', atTop && scrollHeight - clientHeight > 80);
});
</script>
</body>
</html>
