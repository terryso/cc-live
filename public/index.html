<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CC Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" integrity="sha384-eFTL69TLRZTkNfYZOLM+G04821K1qZao/4QLJbet1pP4tcF+fdXq/9CdqAbWRl/L" crossorigin="anonymous" id="hljs-light">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH" crossorigin="anonymous" id="hljs-dark" disabled>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js" integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" integrity="sha384-RH2xi4eIQ/gjtbs9fUXM68sLSi99C7ZWBRX1vDrVv6GQXRibxXLbwO2NGZB74MbU" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.5/purify.min.js" integrity="sha384-qSFej5dZNviyoPgYJ5+Xk4bEbX8AYddxAHPuzs1aSgRiXxJ3qmyWNaPsRkpv/+x5" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-hd">
      <div class="sidebar-hd-left">
        <h1><span>CC</span> LIVE</h1>
        <div class="status"><span class="dot" id="dot"></span><span id="status">Connecting...</span></div>
      </div>
      <div class="sidebar-actions">
        <button type="button" class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">☀️</button>
      </div>
    </div>
    <div class="slist" id="slist"></div>
    <div class="shares-panel" id="sharesPanel" style="display:none">
      <div class="sh-title">Active Shares</div>
      <div id="sharesList"></div>
    </div>
  </div>
  <div class="main">
    <div class="main-hd">
      <div class="main-hd-left">
        <button type="button" class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="main-hd-info">
          <div class="title" id="title">Select a project</div>
          <div class="path" id="path"></div>
        </div>
      </div>
      <div class="main-hd-actions">
        <button type="button" class="zen-toggle" id="zenToggle" title="Zen Mode (F)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="3"/><line x1="8" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="16" y2="21"/></svg></button>
        <button type="button" class="dash-toggle" id="dashboardToggle" title="Dev Dashboard"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="13" y="3" width="8" height="4" rx="2"/><rect x="13" y="10" width="8" height="11" rx="2"/><rect x="3" y="13" width="7" height="8" rx="2"/></svg></button>
        <a class="gh-link" href="https://github.com/terryso/cc-live" target="_blank" rel="noopener" title="GitHub" aria-label="View on GitHub">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
    </div>
    <div class="filter-bar" id="filterBar">
      <span class="filter-label">Filter</span>
      <button class="filter-chip active" data-role="all">All</button>
      <button class="filter-chip" data-role="user">User</button>
      <button class="filter-chip" data-role="assistant">Assistant</button>
      <button class="filter-chip" data-role="tool_response">Tool</button>
      <button class="filter-chip" data-role="system">System</button>
      <span class="filter-count" id="filterCount"></span>
    </div>
    <div class="dashboard" id="dashboard"><div class="dash-inner"></div></div>
    <div class="msgs" id="msgs"><div class="empty">Select a project to view sessions</div></div>
    <div id="danmaku-layer" class="danmaku-layer"></div>
    <div id="danmaku-bar" class="danmaku-bar" style="display:none">
      <button type="button" class="danmaku-toggle" id="danmakuToggle" title="Toggle danmaku"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
      <span class="danmaku-nick" id="danmakuNick" title="Click to change nickname"></span>
      <input type="text" class="danmaku-input" id="danmakuInput" placeholder="发条弹幕..." maxlength="200" autocomplete="off">
      <button type="button" class="danmaku-emoji-btn" id="danmakuEmojiBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
      <div class="danmaku-emoji-picker" id="danmakuEmojiPicker" style="display:none"></div>
      <button type="button" class="danmaku-send" id="danmakuSend">Send</button>
    </div>
    <button type="button" class="scroll-nav to-top" id="scrollToTop" aria-label="Scroll to top">&#8593;</button>
    <button type="button" class="scroll-nav to-bottom" id="scrollToBottom" aria-label="Scroll to bottom">&#8595;</button>
  </div>
</div>

<button type="button" class="zen-exit" id="zenExit" aria-label="Exit zen mode">Press F or Esc to exit</button>

<div id="passwordGate" class="password-gate" style="display:none">
  <div class="password-card">
    <div class="password-icon">🔒</div>
    <h2>Password Required</h2>
    <p class="password-hint">Enter the password to access this shared session</p>
    <input type="password" id="passwordInput" class="password-input" placeholder="Enter password" autocomplete="off">
    <div id="passwordError" class="password-error" style="display:none"></div>
    <button type="button" id="passwordSubmit" class="password-submit">Unlock</button>
  </div>
</div>
<div id="nickModal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:340px">
    <h2>Change Nickname</h2>
    <input type="text" id="nickInput" class="modal-input" maxlength="20" autocomplete="off">
    <div class="hint">Max 20 characters</div>
    <div class="btn-row">
      <button type="button" id="nickCancelBtn">Cancel</button>
      <button type="button" id="nickSaveBtn" class="primary">Save</button>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="modalTitle">Share Project</h2>
    <div id="modalBody"></div>
  </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
