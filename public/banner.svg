  <!-- LIVE red dot -->
  <rect x="950" y="40" width="14" height="14" fill="#ff3b3b" rx="2" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
