      fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.25"/>
  </g>

  <!-- Scanline overlay -->
  <rect width="1280" height="213" fill="url(#scanlines)" opacity="0.2"/>

  <!-- Corner decorations -->
  <g stroke="#00ff88" stroke-width="1" opacity="0.15">
    <line x1="10" y1="10" x2="40" y2="10"/>
    <line x1="10" y1="10" x2="10" y2="40"/>
    <line x1="1270" y1="10" x2="1240" y2="10"/>
    <line x1="1270" y1="10" x2="1270" y2="40"/>
    <line x1="10" y1="203" x2="40" y2="203"/>
    <line x1="10" y1="203" x2="10" y2="173"/>
    <line x1="1270" y1="203" x2="1240" y2="203"/>
    <line x1="1270" y1="203" x2="1270" y2="173"/>
  </g>

  <!-- Floating code fragments -->
  <g font-family="monospace" font-size="9" opacity="0.1" fill="#00ff88">
    <text x="30" y="22">&gt; node server.js</text>
    <text x="1100" y="22">SSE stream connected</text>
    <text x="30" y="185">// watch AI code live</text>
    <text x="1100" y="185">zero deps ✓</text>
  </g>
</svg>
