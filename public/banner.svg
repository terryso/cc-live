<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 213" width="1280" height="213">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#0e2a1e" stroke-width="0.5"/>
    </pattern>
    <pattern id="scanlines" width="1280" height="4" patternUnits="userSpaceOnUse">
      <rect width="1280" height="2" fill="rgba(0,0,0,0.1)"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="213" fill="#0a0f0d"/>
  <rect width="1280" height="213" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <ellipse cx="640" cy="100" rx="400" ry="80" fill="#00ff88" opacity="0.03"/>

  <!-- ===== CC LIVE pixel text (scaled to ~1/3) ===== -->
  <g filter="url(#glow)" transform="translate(130, 30)">
    <!-- Letter C (first) - 16px blocks -->
